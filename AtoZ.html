<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A to Z Horses</title>
  <style>
    body {
      background: #1e1e2f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
    }
    h1 {
      color: #ffd700;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .sub {
      text-align: center;
      color: #cfcfcf;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }
    .nav-link {
      text-align: center;
      margin-bottom: 2rem;
    }
    .nav-link a {
      color: #00bfff;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.05rem;
    }
    .nav-link a:hover {
      text-decoration: underline;
    }
    .meta {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #111;
      background: linear-gradient(90deg, #ffd700, #ffef8a);
      padding: 0.8rem 1rem;
      border-radius: 10px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #2c2c3e;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    th, td {
      padding: 0.7rem 0.85rem;
      text-align: center;
      border-bottom: 1px solid #3d3d55;
      vertical-align: top;
    }
    th {
      background: #444;
      color: #ffd700;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr:nth-child(even) {
      background: #2a2a3d;
    }
    td:first-child {
      font-weight: 700;
      color: #fff3b0;
    }
    td:nth-child(7) {
      text-align: left;
      min-width: 260px;
    }
  </style>
</head>
<body>
  <h1>🔤 A to Z Horses</h1>
  <div class="sub">Every horse modelled today, sorted alphabetically</div>

  <div class="meta">🏇 Horses: 0 | 🕒 Updated: 08 Apr 2026, 08:46</div>

  <div class="nav-link">
    <a href="index.html">🔙 Back to Race Visualizer</a>
  </div>

  <table border="1" class="dataframe">
  <thead>
    <tr style="text-align: right;">
      <th>Horse Name</th>
      <th>Race</th>
      <th>Real Odds</th>
      <th>Model Odds</th>
      <th>Score</th>
      <th>Raw Odds</th>
      <th>Tags</th>
      <th>Data %</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>
</body>
</html>
